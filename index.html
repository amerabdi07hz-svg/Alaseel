<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>نظام الأصيل للخدمات الإعلانية — سحابي</title>
<!-- ربط ملف التصميم -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="boot"><div><div class="badge">أ</div>
  <div style="font-weight:700">نظام الأصيل — النسخة السحابية</div>
  <div class="spin" id="spin"></div>
  <div id="bootmsg" style="font-size:12px;color:#6b7490;margin-top:14px">جاري الاتصال بقاعدة البيانات…</div>
</div></div>

<div id="root"></div>

<!-- المكتبات الأساسية -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- تهيئة قاعدة البيانات وتشغيل التطبيق -->
<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const firebaseConfig = {
      apiKey: "AIzaSyCNKNFI8y8pvQivKkvik0wgNNrhLVUniC8",
      authDomain: "aseelshop-43d59.firebaseapp.com",
      projectId: "aseelshop-43d59",
      storageBucket: "aseelshop-43d59.firebasestorage.app",
      messagingSenderId: "347862538054",
      appId: "1:347862538054:web:a11b16c9028ff18cff7747"
    };
    const app = initializeApp(firebaseConfig);
    const db = fs.getFirestore(app);
    window._db = db;
    window._fs = { doc: fs.doc, getDoc: fs.getDoc, setDoc: fs.setDoc, collection: fs.collection, getDocs: fs.getDocs, onSnapshot: fs.onSnapshot };
    document.getElementById('bootmsg').textContent = 'تم الاتصال. جاري تحميل النظام…';
    
    // جلب ملف البرمجة app.js
    const response = await fetch('app.js');
    if (!response.ok) throw new Error("تعذر تحميل ملف app.js");
    const appSource = await response.text();
    
    // ترجمة الكود وتشغيله
    const compiled = Babel.transform(appSource, { presets: [['react', { runtime: 'classic' }]] }).code;
    (new Function(compiled))();
  } catch (e) {
    console.error(e);
    const errEl = document.querySelector('#boot .err') || document.createElement('div');
    errEl.className = 'err';
    errEl.innerHTML = 'تعذّر الاتصال بـ Firebase أو تحميل الملفات.<br>تأكّد من تشغيل المشروع عبر Local Server.<br><br>' + (e && e.message ? e.message : '');
    if(!document.querySelector('#boot .err')) document.getElementById('boot').firstElementChild.appendChild(errEl);
  }
</script>

<script>
  (function(){ var tries=0; var t=setInterval(function(){
    var root=document.getElementById('root'); tries++;
    if(root && root.childElementCount>0){ var b=document.getElementById('boot'); if(b) b.remove(); clearInterval(t); }
    if(tries>300){ clearInterval(t); }
  },100); })();
</script>
</body>
</html>
