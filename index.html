const BRAND = "#283D74";

const DB = {
  async get(key, fallback) {
    try {
      const snap = await window._fs.getDoc(window._fs.doc(window._db, "appdata", key));
      if (snap.exists()) {
        const d = snap.data();
        return d && "v" in d ? d.v : fallback;
      }
      return fallback;
    } catch (e) {
      console.error("Firestore get error", key, e);
      return fallback;
    }
  },
  async set(key, value) {
    try {
      await window._fs.setDoc(window._fs.doc(window._db, "appdata", key), { v: value });
      return true;
    } catch (e) {
      console.error("Firestore set error", key, e);
      return false;
    }
  },
}

function hashPwd(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (h * 33) ^ s.charCodeAt(i);
  return "h" + (h >>> 0).toString(16);
}

  useEffect(() => {
    (async () => {
      let u = await DB.get("users", null);

        u = [{
          id: uid(), username: "admin", name: "المدير العام",
          pwd: hashPwd("admin123"), roleId: "admin", active: true,
          avatar: "", lastLogin: null, createdAt: now(),
        }];
        await DB.set("users", u);
      }
      setUsers(u); setRoles(r);
      setEmployees(await DB.get("employees", []));
      setCustomers(await DB.get("customers", []));
      setSuppliers(await DB.get("suppliers", []));
      setAudit(await DB.get("audit", []));
      setTheme(await DB.get("theme", "light"));
      setLoaded(true);
    })();
  }, []);

  const persist = {
    users: (v) => { setUsers(v); DB.set("users", v); },
    roles: (v) => { setRoles(v); DB.set("roles", v); },
    employees: (v) => { setEmployees(v); DB.set("employees", v); },
    customers: (v) => { setCustomers(v); DB.set("customers", v); },
    suppliers: (v) => { setSuppliers(v); DB.set("suppliers", v); },
    audit: (v) => { setAudit(v); DB.set("audit", v); },
  };

  const toast = useCallback((msg, type = "success") => {
    const id = uid();
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3200);
  }, []);

  const log = useCallback((action, entity, detail) => {
    const entry = { id: uid(), user: session?.name || "—", action, entity, detail, at: now() };
    setAudit((prev) => { const next = [entry, ...prev].slice(0, 1000); DB.set("audit", next); return next; });
  }, [session]);

  const toggleTheme = () => { const t = theme === "light" ? "dark" : "light"; setTheme(t); DB.set("theme", t); };

  const currentRole = useMemo(
    () => roles.find((r) => r.id === session?.roleId) || null,
    [roles, session]
  );

  const value = {
    theme, toggleTheme, session, setSession,
    users, roles, employees, customers, suppliers, audit,
    persist, toast, log, currentRole, setToasts,
  };

  if (!loaded) {
    return (
      <div dir="rtl" style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: "#f1f3f8", fontFamily: "Tajawal, sans-serif" }}>
        <div style={{ color: BRAND, fontWeight: 700 }}>جاري التحميل…</div>
      </div>
    );
  }

  return (
    <Ctx.Provider value={value}>
      <FontStyles />
      <div dir="rtl" data-theme={theme} className="app-root">
        {!session ? <Login /> : <Shell />}
        <ToastStack toasts={toasts} />
      </div>
    </Ctx.Provider>
  );
}

function DataTable({ columns, rows, title, filters, exportName }) {
  const [q, setQ] = useState("");
  const [sort, setSort] = useState({ key: null, dir: 1 });
  const [showFilters, setShowFilters] = useState(false);

  const filtered = useMemo(() => {
    let r = rows;
    if (q.trim()) {
      const s = q.trim().toLowerCase();
      r = r.filter((row) => columns.some((c) => String(getVal(row, c)).toLowerCase().includes(s)));
    }
    if (sort.key) {
      const col = columns.find((c) => c.key === sort.key);
      r = [...r].sort((a, b) => {
        let x = getVal(a, col), y = getVal(b, col);
        if (col.type === "num") { x = Number(x) || 0; y = Number(y) || 0; }
        else { x = String(x); y = String(y); }
        return x < y ? -sort.dir : x > y ? sort.dir : 0;
      });
    }
    return r;
  }, [rows, q, sort, columns]);

  function getVal(row, col) { return col.value ? col.value(row) : row[col.key]; }

  const clickSort = (c) => {
    if (c.noSort) return;
    setSort((s) => (s.key === c.key ? { key: c.key, dir: -s.dir } : { key: c.key, dir: 1 }));
  };

  const exportRows = filtered.map((row) => {
    const o = {};
    columns.forEach((c) => { if (!c.noExport) o[c.label] = getVal(row, c); });
    return o;
  });

  return (
    <div>
      <div className="toolbar no-print" style={{ marginBottom: 14 }}>
        <div style={{ position: "relative", flex: "1 1 220px", minWidth: 180 }}>
          <span style={{ position: "absolute", insetInlineStart: 11, top: 11, color: "var(--muted)", pointerEvents: "none", display: "flex", alignItems: "center" }}>
            <Search size={16} />
          </span>
          <input className="input" style={{ paddingInlineStart: 34 }} placeholder="بحث فوري…"
            value={q} onChange={(e) => setQ(e.target.value)} />
        </div>
        {filters && <button className="btn btn-ghost" onClick={() => setShowFilters((v) => !v)}>
          <Filter size={15} /> تصفية
        </button>}
        <button className="btn btn-ghost" onClick={() => window.print()}><Printer size={15} /> طباعة</button>
        <button className="btn btn-ghost" onClick={() => exportExcel(exportRows, exportName)}><FileSpreadsheet size={15} /> Excel</button>
        <button className="btn btn-ghost" onClick={() => exportPDF(title, columns.filter(c => !c.noExport), exportRows)}><FileText size={15} /> PDF</button>
      </div>

      {showFilters && filters && <div className="card no-print" style={{ padding: 14, marginBottom: 14, display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))" }}>{filters}</div>}

      <div className="card print-area">
        <div className="scroll-x">
          <table>
            <thead>
              <tr>
                {columns.map((c) => (
                  <th key={c.key} className={c.noSort ? "no-sort" : ""} onClick={() => clickSort(c)}>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
                      {c.label}
                      {sort.key === c.key && (sort.dir === 1 ? <ChevronUp size={13} /> : <ChevronDown size={13} />)}
                    </span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan={columns.length} style={{ textAlign: "center", padding: 40, color: "var(--muted)" }}>
                  لا توجد بيانات. استخدم زر «إضافة» لإدخال أول سجل.
                </td></tr>
              ) : filtered.map((row) => (
                <tr key={row.id}>
                  {columns.map((c) => (
                    <td key={c.key}>{c.render ? c.render(row) : getVal(row, c)}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 8, fontWeight: 700 }}>
        عدد السجلات: {filtered.length}
      </div>
    </div>
  );
}

function exportExcel(rows, name) {
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);
  const esc = (v) => `\"${String(v ?? "").replace(/"/g, '""')}\"`;
  const csv = "\uFEFF" + [headers.map(esc).join(","), ...rows.map((r) => headers.map((h) => esc(r[h])).join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  triggerDownload(blob, `${name}.csv`);
}
function exportPDF(title, columns, rows) {
  const html = `<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>${title}</title>
  <style>body{font-family:Tajawal,Arial,sans-serif;padding:28px;color:#1b2439}
  h1{color:${BRAND};font-size:20px;margin:0 0 4px}.sub{color:#6b7490;font-size:12px;margin-bottom:18px}
  table{width:100%;border-collapse:collapse;font-size:12px}th{background:${BRAND};color:#fff;padding:8px;text-align:right}
  td{padding:7px 8px;border-bottom:1px solid #e3e7f0;text-align:right}tr:nth-child(even){background:#f7f9fc}</style></head>
  <body><h1>الأصيل للخدمات الإعلانية</h1><div class="sub">${title} — ${new Date().toLocaleString("en-GB")}</div>
  <table><thead><tr>${columns.map((c) => `<th>${c.label}</th>`).join("")}</tr></thead>
  <tbody>${rows.map((r) => `<tr>${columns.map((c) => `<td>${r[c.label] ?? ""}</td>`).join("")}</tr>`).join("")}</tbody></table>
  <scr"+"ipt>window.onload=()=>{window.print()}</scr"+"ipt></body></html>`;
  const w = window.open("", "_blank");
  if (w) { w.document.write(html); w.document.close(); }
}
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div className="modal-back no-print" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="card modal" style={wide ? { maxWidth: 720 } : undefined}>
        <div style={{ display: "flex", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid var(--line)" }}>

        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>

}
function Field({ label, children }) {
  return <div><label className="label">{label}</label>{children}</div>;
}
function Grid2({ children }) {
  return <div className="grid2">{children}</div>;
}

function useConfirm() {
  const [state, setState] = useState(null);
  const confirm = (msg, cb) => setState({ msg, cb });
  const node = state ? (
    <Modal title="تأكيد" onClose={() => setState(null)}>
      <p style={{ margin: "0 0 20px", fontSize: 15 }}>{state.msg}</p>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-start" }}>
        <button className="btn btn-danger" onClick={() => { state.cb(); setState(null); }}>نعم، متابعة</button>
        <button className="btn btn-ghost" onClick={() => setState(null)}>إلغاء</button>
      </div>
    </Modal>
  ) : null;
  return { confirm, node };
}

              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 12.5, color: "var(--muted)", fontWeight: 700 }}>{c.label}</div>
                <div className="heading" style={{ fontSize: 21, fontWeight: 800 }}>{c.value}</div>

              <YAxis tick={{ fill: axisColor, fontSize: 11 }} />
              <Tooltip contentStyle={{ direction: "rtl", background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 10, color: "var(--text)" }} />
              <Bar dataKey="value" fill={BRAND} radius={[8, 8, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>

        <div className="card" style={{ padding: 18 }}>
          <h3 className="heading" style={{ margin: "0 0 14px", fontSize: 16 }}>توزيع المبالغ المستحقة</h3>
          <ResponsiveContainer width="100%" height={260}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={90} label={(e) => money(e.value)}>
                {pieData.map((_, i) => <Cell key={i} fill={PIE_C[i]} />)}
              </Pie>
              <Legend wrapperStyle={{ fontFamily: "Tajawal", fontSize: 12 }} />
              <Tooltip contentStyle={{ direction: "rtl", background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 10 }} />
            </PieChart>
          </ResponsiveContainer>

      <div style={{ display: "grid", gap: 18, gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))" }}>
        <MiniList title="آخر الزبائن" empty="لا يوجد زبائن بعد"
          items={latestCustomers.map((c) => ({ id: c.id, a: c.name, b: money(c.remaining) + " باقٍ" }))} />
        <MiniList title="آخر الموردين" empty="لا يوجد موردون بعد"

function MiniList({ title, items, empty }) {
  return (
    <div className="card" style={{ padding: 18 }}>
      <h3 className="heading" style={{ margin: "0 0 12px", fontSize: 15 }}>{title}</h3>
      {items.length === 0 ? <p style={{ color: "var(--muted)", fontSize: 13, margin: 0 }}>{empty}</p> :
        items.map((it) => (
          <div key={it.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--line)", fontSize: 13 }}>
            <span style={{ fontWeight: 700 }}>{it.a}</span>
            <span style={{ color: "var(--muted)" }}>{it.b}</span>
          </div>
        ))}

}

/* ============================================================
   Users administration
   ============================================================ */
function UsersAdmin() {
  const { users, roles, persist, toast, log, session } = useApp();
  const [modal, setModal] = useState(null);
  const [roleModal, setRoleModal] = useState(false);
  const { confirm, node } = useConfirm();

  const roleName = (id) => roles.find((r) => r.id === id)?.name || "—";

  const saveUser = (data) => {
    if (modal.mode === "add") {
      if (users.some((u) => u.username.toLowerCase() === data.username.toLowerCase()))
        return toast("اسم المستخدم مستخدم بالفعل", "error");
      const rec = { id: uid(), name: data.name, username: data.username, pwd: hashPwd(data.pwd || "123456"),
        roleId: data.roleId, active: true, avatar: "", lastLogin: null, createdAt: now() };
      persist.users([...users, rec]); log("إضافة", "مستخدم", data.username); toast("تمت إضافة المستخدم");
    } else {
      persist.users(users.map((u) => u.id === modal.data.id
        ? { ...u, name: data.name, username: data.username, roleId: data.roleId,
            pwd: data.pwd ? hashPwd(data.pwd) : u.pwd } : u));
      log("تعديل", "مستخدم", data.username); toast("تم حفظ التعديلات");
    }
    setModal(null);
  };
  const toggleActive = (u) => {
    persist.users(users.map((x) => x.id === u.id ? { ...x, active: !x.active } : x));
    log(u.active ? "إيقاف" : "تفعيل", "مستخدم", u.username);
    toast(u.active ? "تم إيقاف المستخدم" : "تم تفعيل المستخدم");
  };
  const resetPwd = (u) => confirm(`إعادة تعيين كلمة مرور «${u.username}» إلى 123456؟`, () => {
    persist.users(users.map((x) => x.id === u.id ? { ...x, pwd: hashPwd("123456") } : x));
    log("إعادة تعيين كلمة المرور", "مستخدم", u.username); toast("تمت إعادة التعيين إلى 123456");
  });
  const del = (u) => {
    if (u.id === session.id) return toast("لا يمكنك حذف حسابك الحالي", "error");
    confirm(`حذف المستخدم «${u.username}»؟`, () => {
      persist.users(users.filter((x) => x.id !== u.id));
      log("حذف", "مستخدم", u.username); toast("تم الحذف", "error");
    });
  };

  const columns = [
    { key: "name", label: "الاسم" },
    { key: "username", label: "اسم المستخدم" },
    { key: "roleId", label: "الصلاحية", value: (r) => roleName(r.roleId) },
    { key: "active", label: "الحالة", render: (r) => (
      <span className="badge" style={{ background: r.active ? "#2e9e5b22" : "#e5484d22", color: r.active ? "#2e9e5b" : "#e5484d" }}>
        {r.active ? "مفعّل" : "موقوف"}
      </span>
    ) },
    { key: "lastLogin", label: "آخر دخول", value: (r) => fmtDate(r.lastLogin), render: (r) => fmtDate(r.lastLogin) },
    { key: "act", label: "إجراءات", noSort: true, noExport: true, render: (r) => (
      <div style={{ display: "flex", gap: 6, flexWrap: "nowrap", alignItems: "center", flexShrink: 0 }}>
        <button className="icon-btn" onClick={() => setModal({ mode: "edit", data: r })} aria-label="تعديل"><Pencil size={15} /></button>
        <button className="icon-btn" onClick={() => resetPwd(r)} aria-label="إعادة تعيين"><KeyRound size={15} /></button>
        <button className="icon-btn" onClick={() => toggleActive(r)} aria-label="إيقاف/تفعيل"><Power size={15} /></button>
        <button className="icon-btn" onClick={() => del(r)} aria-label="حذف"><Trash2 size={15} /></button>
      </div>
    ) },
  ];

  return (
    <div>
      <div className="no-print" style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <button className="btn btn-ghost" style={{ marginInlineStart: "auto" }} onClick={() => setRoleModal(true)}>
          <Shield size={16} /> إدارة الصلاحيات
        </button>
        <button className="btn btn-primary" onClick={() => setModal({ mode: "add", data: {} })}><Plus size={16} /> مستخدم جديد</button>
      </div>
      <DataTable title="المستخدمون" exportName="users" columns={columns} rows={users} />
      {modal && <UserForm mode={modal.mode} data={modal.data} roles={roles} onSave={saveUser} onClose={() => setModal(null)} />}
      {roleModal && <RolesEditor onClose={() => setRoleModal(false)} />}
      {node}
    </div>
  );
}

function UserForm({ mode, data, roles, onSave, onClose }) {
  const [f, setF] = useState({ name: "", username: "", pwd: "", roleId: roles[0]?.id, ...data, pwd: "" });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  return (
    <Modal title={mode === "add" ? "مستخدم جديد" : "تعديل مستخدم"} onClose={onClose}>
      <div style={{ display: "grid", gap: 14 }}>
        <Grid2>
          <Field label="الاسم"><input className="input" value={f.name} onChange={set("name")} /></Field>
          <Field label="اسم المستخدم"><input className="input" value={f.username} onChange={set("username")} /></Field>
        </Grid2>
        <Grid2>
          <Field label="الصلاحية">
            <select className="select" value={f.roleId} onChange={set("roleId")}>
              {roles.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </Field>
          <Field label={mode === "add" ? "كلمة المرور" : "كلمة مرور جديدة (اختياري)"}>
            <input className="input" type="password" value={f.pwd} onChange={set("pwd")}
              placeholder={mode === "add" ? "افتراضي 123456" : "اتركه فارغاّ للإبقاء"} />
          </Field>
        </Grid2>
      </div>
      <FormActions onSave={() => { if (!f.name || !f.username) return; onSave(f); }} onClose={onClose} />
    </Modal>
  );
}

function RolesEditor({ onClose }) {
  const { roles, persist, toast, log } = useApp();
  const [local, setLocal] = useState(roles);
  const [newName, setNewName] = useState("");

  const toggle = (rid, pkey) => setLocal(local.map((r) => r.id !== rid ? r :
    { ...r, pages: r.pages.includes(pkey) ? r.pages.filter((p) => p !== pkey) : [...r.pages, pkey] }));
  const addRole = () => {
    if (!newName.trim()) return;
    setLocal([...local, { id: uid(), name: newName.trim(), pages: ["dashboard"] }]);
    setNewName("");
  };
  const removeRole = (rid) => setLocal(local.filter((r) => r.id !== rid || r.locked));
  const save = () => { persist.roles(local); log("تعديل", "الصلاحيات", ""); toast("تم حفظ الصلاحيات"); onClose(); };

  return (
    <Modal title="إدارة الصلاحيات (RBAC)" onClose={onClose} wide>
      <p style={{ color: "var(--muted)", fontSize: 13, marginTop: 0 }}>
        حدّد الصفحات المسموح بها لكل دور. الصفحات غير المسموح بها لا تظهر إطلاقاً في القائمة الجانبية للمستخدم.
      </p>
      <div className="scroll-x">
        <table>
          <thead>
            <tr>
              <th className="no-sort">الدور</th>
              {PAGES.map((p) => <th key={p.key} className="no-sort" style={{ textAlign: "center" }}>{p.label}</th>)}
              <th className="no-sort"></th>
            </tr>
          </thead>
          <tbody>
            {local.map((r) => (
              <tr key={r.id}>
                <td style={{ fontWeight: 800 }}>{r.name}{r.locked && <span className="badge" style={{ marginInlineStart: 6, background: GREY + "55", color: "var(--muted)" }}>أساسي</span>}</td>
                {PAGES.map((p) => (
                  <td key={p.key} style={{ textAlign: "center" }}>
                    <input type="checkbox" checked={r.pages.includes(p.key)}
                      disabled={r.locked}
                      onChange={() => toggle(r.id, p.key)}
                      style={{ width: 17, height: 17, accentColor: BRAND, cursor: r.locked ? "not-allowed" : "pointer" }} />
                  </td>
                ))}
                <td>{!r.locked && <button className="icon-btn" onClick={() => removeRole(r.id)} aria-label="حذف الدور"><Trash2 size={14} /></button>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 16, alignItems: "flex-end" }}>
        <div style={{ flex: 1 }}>
          <label className="label">إنشاء دور جديد</label>
          <input className="input" value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="مثال: مدخل بيانات" />
        </div>
        <button className="btn btn-ghost" onClick={addRole}><Plus size={15} /> إضافة دور</button>
      </div>
      <FormActions onSave={save} onClose={onClose} />
    </Modal>
  );
}

   Audit Log

/* ============================================================
   Backup / restore
   ============================================================ */
function Backup() {
  const { employees, customers, suppliers, users, roles, audit, persist, toast, log } = useApp();
  const doBackup = () => {
    const snapshot = { version: 1, at: now(), employees, customers, suppliers, users, roles, audit };
    const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
    triggerDownload(blob, `alaseel-backup-${new Date().toISOString().slice(0, 10)}.json`);
    log("نسخ احتياطي", "النظام", ""); toast("تم إنشاء النسخة الاحتياطية");
  };
  const doRestore = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d.version) throw new Error();
        persist.employees(d.employees || []); persist.customers(d.customers || []);
        persist.suppliers(d.suppliers || []); persist.users(d.users || []);
        persist.roles(d.roles || DEFAULT_ROLES); persist.audit(d.audit || []);
        log("استعادة نسخة", "النظام", ""); toast("تمت استعادة النسخة بنجاح");
      } catch { toast("ملف النسخة غير صالح", "error"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  return (
    <div style={{ display: "grid", gap: 18, gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))" }}>
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 46, height: 46, borderRadius: 12, background: BRAND + "22", color: BRAND, display: "grid", placeItems: "center" }}><Download size={22} /></div>
          <h3 className="heading" style={{ margin: 0, fontSize: 17 }}>إنشاء نسخة احتياطية</h3>
        </div>
        <p style={{ color: "var(--muted)", fontSize: 13.5, lineHeight: 1.7 }}>تنزيل كامل بيانات النظام (الموظفون، الزبائن، الموردون، المستخدمون، الصلاحيات، السجل) في ملف واحد.</p>
        <button className="btn btn-primary" onClick={doBackup}><Download size={16} /> تنزيل النسخة</button>
      </div>
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 46, height: 46, borderRadius: 12, background: "#e5484d22", color: "#e5484d", display: "grid", placeItems: "center" }}><Upload size={22} /></div>
          <h3 className="heading" style={{ margin: 0, fontSize: 17 }}>استعادة نسخة</h3>
        </div>
        <p style={{ color: "var(--muted)", fontSize: 13.5, lineHeight: 1.7 }}>استعادة البيانات من ملف نسخة سابق. سيتم استبدال البيانات الحالية بالكامل.</p>
        <label className="btn btn-ghost" style={{ cursor: "pointer" }}>
          <RotateCcw size={16} /> اختيار ملف واستعادة
          <input type="file" accept="application/json" onChange={doRestore} style={{ display: "none" }} />
        </label>
      </div>
    </div>
  );
}

/* ============================================================
   Profile
   ============================================================ */
function Profile() {
  const { session, setSession, users, persist, toast, currentRole } = useApp();
  const [name, setName] = useState(session.name);
  const [cur, setCur] = useState(""); const [np, setNp] = useState(""); const [np2, setNp2] = useState("");

  const saveName = () => {
    persist.users(users.map((u) => u.id === session.id ? { ...u, name } : u));
    setSession({ ...session, name }); toast("تم تحديث الاسم");
  };
  const changePwd = () => {
    const me = users.find((u) => u.id === session.id);
    if (me.pwd !== hashPwd(cur)) return toast("كلمة المرور الحالية غير صحيحة", "error");
    if (!np || np.length < 4) return toast("كلمة المرور قصيرة جداً", "error");
    if (np !== np2) return toast("كلمتا المرور غير متطابقتين", "error");
    persist.users(users.map((u) => u.id === session.id ? { ...u, pwd: hashPwd(np) } : u));
    setCur(""); setNp(""); setNp2(""); toast("تم تغيير كلمة المرور");
  };
  const setAvatar = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      persist.users(users.map((u) => u.id === session.id ? { ...u, avatar: reader.result } : u));
      setSession({ ...session, avatar: reader.result }); toast("تم تحديث الصورة");
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{ display: "grid", gap: 18, gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))", maxWidth: 820 }}>
      <div className="card" style={{ padding: 24 }}>
        <h3 className="heading" style={{ marginTop: 0, fontSize: 17 }}>البيانات الشخصية</h3>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 18 }}>
          <Avatar user={session} size={72} />
          <div>
            <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
              تغيير الصورة
              <input type="file" accept="image/*" onChange={setAvatar} style={{ display: "none" }} />
            </label>
            <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 8, fontWeight: 700 }}>الصلاحية: {currentRole?.name}</div>
          </div>
        </div>
        <Field label="الاسم"><input className="input" value={name} onChange={(e) => setName(e.target.value)} /></Field>
        <div style={{ margin: "12px 0", fontSize: 13, color: "var(--muted)" }}>
          <div>اسم المستخدم: <b style={{ color: "var(--text)" }}>{session.username}</b></div>
          <div>آخر تسجيل دخول: <b style={{ color: "var(--text)" }}>{fmtDate(session.lastLogin)}</b></div>
        </div>
        <button className="btn btn-primary" onClick={saveName}><Save size={16} /> حفظ الاسم</button>
      </div>

      <div className="card" style={{ padding: 24 }}>
        <h3 className="heading" style={{ marginTop: 0, fontSize: 17 }}>تغيير كلمة المرور</h3>
        <div style={{ display: "grid", gap: 14 }}>
          <Field label="كلمة المرور الحالية"><input className="input" type="password" value={cur} onChange={(e) => setCur(e.target.value)} /></Field>
          <Field label="كلمة المرور الجديدة"><input className="input" type="password" value={np} onChange={(e) => setNp(e.target.value)} /></Field>
          <Field label="تأكيد كلمة المرور"><input className="input" type="password" value={np2} onChange={(e) => setNp2(e.target.value)} /></Field>
          <button className="btn btn-primary" onClick={changePwd}><KeyRound size={16} /> تغيير كلمة المرور</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Toast stack
   ============================================================ */
function ToastStack({ toasts }) {
  return (
    <div className="no-print" style={{ position: "fixed", bottom: 20, insetInlineStart: 20, display: "flex", flexDirection: "column", gap: 10, zIndex: 100 }}>
      {toasts.map((t) => (
        <div key={t.id} style={{
          background: "var(--surface)", border: "1px solid var(--line)", borderInlineStart: `4px solid ${t.type === "error" ? "#e5484d" : "#2e9e5b"}`,
          borderRadius: 12, padding: "12px 18px", boxShadow: "var(--shadow)", minWidth: 220, fontWeight: 700, fontSize: 14,
          display: "flex", alignItems: "center", gap: 10, animation: "slidein .2s ease",
        }}>
          <div style={{ width: 24, height: 24, borderRadius: "50%", display: "grid", placeItems: "center", flexShrink: 0,
            background: t.type === "error" ? "#e5484d22" : "#2e9e5b22", color: t.type === "error" ? "#e5484d" : "#2e9e5b" }}>
            {t.type === "error" ? <X size={15} /> : <Check size={15} />}
          </div>
          {t.msg}
        </div>
      ))}
    </div>
  );
}
